<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Icons -->
		<link rel="icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- Global social / SEO -->
		<meta property="og:site_name" content="Bearprompt" />
		<meta property="og:locale" content="en_US" />
		<meta name="twitter:site" content="@bearprompt" />

		<script>
			(() => {
				const HASH_PREFIX = '#share=';
				const STORAGE_KEY = '__bearprompt_share_ref_v1';
				const { hash, pathname } = window.location;

				if (pathname !== '/library' || !hash.startsWith(HASH_PREFIX)) {
					return;
				}

				const value = hash.slice(HASH_PREFIX.length);
				const separatorIndex = value.indexOf(':');
				if (separatorIndex <= 0) return;

				try {
					const id = decodeURIComponent(value.slice(0, separatorIndex)).trim();
					const key = decodeURIComponent(value.slice(separatorIndex + 1)).trim();
					if (!id || !key) return;

					sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ id, key }));
					history.replaceState(null, '', pathname + window.location.search);
				} catch {
					// Ignore malformed share hashes or storage failures.
				}
			})();
		</script>

		<!-- Umami Analytics -->
		<script defer src="https://cloud.umami.is/script.js" data-website-id="f166385c-3841-4acd-8dac-10b9addb6dff"></script>

		<!-- Bunny Fonts: Bricolage Grotesque + Space Grotesk -->
		<link rel="preconnect" href="https://fonts.bunny.net" />
		<link href="https://fonts.bunny.net/css?family=bricolage-grotesque:400,500,600,700,800|space-grotesk:300,400,500,600,700" rel="stylesheet" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
